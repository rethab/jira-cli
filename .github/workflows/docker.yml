name: Publish a Docker image
run-name: Docker image for ${{ github.ref_name }}

# Triggered by the tag push, not release-published: releases here are created
# by workflows using GITHUB_TOKEN, and GitHub suppresses events from that
# token, so a release trigger would never fire.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# A newer merge to main supersedes an in-flight build of main. Tags get their
# own group, so a release build is never cancelled by a merge.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to the registry
      id-token: write # OIDC token for keyless provenance signing
      attestations: write # store the provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # "latest" follows main, so it is not what a release publishes;
          # pin a version tag for a stable image.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable={{is_default_branch}}
          flavor: latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
          # A push event checks out a detached HEAD, which the Makefile cannot
          # turn into a version by itself.
          build-args: |
            VERSION=${{ github.ref_name }}
          # Deliberately no build cache: a cache that any branch can write to
          # is a way into the images we publish. Cross-compiling (see the
          # Dockerfile) is what keeps the build fast enough to not need one.

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
