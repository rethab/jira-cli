on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  # Queries improve over time, so a codebase that was clean last month is not
  # necessarily clean today.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

name: CodeQL

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # gosec, which runs as part of the linter, matches patterns within a function.
  # CodeQL tracks values between them, so it sees the paths that only look
  # dangerous once you follow an argument across a call boundary.
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload findings to the Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: autobuild
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:go
