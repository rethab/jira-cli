version: 2
project_name: jira

git:
  # The snapshot workflow publishes releases tagged "snapshot-*", which are
  # not valid semver. Without this, GoReleaser picks one up as the current
  # tag on the next run and incpatch below fails to parse it.
  ignore_tags:
    - "snapshot-*"

release:
  prerelease: auto
  name_template: "v{{.Version}}"
  draft: false
  mode: "keep-existing"

snapshot:
  # Monotonic so Homebrew never sees a snapshot as a downgrade.
  version_template: "{{ incpatch .Version }}-next.{{ .CommitTimestamp }}.{{ .ShortCommit }}"

builds:
  - <<: &build_defaults
      binary: bin/jira
      main: ./cmd/jira
      # Reproducible builds: strip local paths and pin file timestamps to the
      # commit, so anyone can rebuild the tag and compare checksums.
      flags:
        - -trimpath
      mod_timestamp: "{{ .CommitTimestamp }}"
      ldflags:
        - -s -w
        - -X github.com/rethab/jira-cli/internal/version.Version={{.Version}}
        - -X github.com/rethab/jira-cli/internal/version.GitCommit={{.FullCommit}}
        - -X github.com/rethab/jira-cli/internal/version.SourceDateEpoch={{.CommitTimestamp}}
      env:
        - CGO_ENABLED=0
    id: macOS
    goos: [darwin]
    goarch: [amd64, arm64]

  - <<: *build_defaults
    id: linux
    goos: [linux]
    goarch: [386, arm, amd64, arm64]

  - <<: *build_defaults
    id: windows
    goos: [windows]
    goarch: [amd64]

archives:
  - id: nix
    ids: [macOS, linux]
    <<: &archive_defaults
      name_template: >-
        {{ .ProjectName }}_{{ .Version }}_{{- if eq .Os "darwin" }}macOS{{- else }}{{ .Os }}{{- end }}_{{- if eq .Arch "amd64" }}x86_64{{- else if eq .Arch "386" }}i386{{- else }}{{ .Arch }}{{- end }}{{- if .Arm }}v{{ .Arm }}{{ end -}}
    wrap_in_directory: true
    formats: [tar.gz]
    files:
      - LICENSE

  - id: windows
    ids: [windows]
    <<: *archive_defaults
    wrap_in_directory: false
    formats: [zip]
    files:
      - LICENSE

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

sboms:
  - artifacts: archive

homebrew_casks:
  - name: jira-cli
    homepage: "https://github.com/rethab/jira-cli"
    description: "🔥 Feature-rich interactive Jira command-line"
    license: "MIT"

    ids:
      - nix

    # The archives ship the binary under bin/, so the cask must reference it there.
    binaries:
      - bin/jira

    generate_completions_from_executable:
      executable: bin/jira
      args:
        - completion
      shells:
        - bash
        - zsh
        - fish

    url:
      verified: "github.com/rethab/jira-cli/"

    conflicts:
      - cask: jira-cli-snapshot

    hooks:
      post:
        # The released binaries are neither signed nor notarized, so Gatekeeper
        # quarantines them on download and every run would be blocked.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bin/jira"]
          end

    repository:
      owner: rethab
      name: homebrew-jira-cli
      # The default GITHUB_TOKEN is scoped to this repository only, so pushing
      # the cask to the tap needs a token that can write to it.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com

    commit_msg_template: "Cask update for version {{ .Tag }}"

    # Folder inside the tap repository to put the cask into.
    directory: Casks

changelog:
  disable: true
  use: github
  sort: desc
  filters:
    exclude:
      - '^doc:'
      - '^dev:'
      - '^build:'
      - '^ci:'
